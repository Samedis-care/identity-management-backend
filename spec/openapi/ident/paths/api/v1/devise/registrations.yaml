# Manual spec for Devise registrations
---
paths:
  "/api/v1/register":
    post:
      summary: "User Account: Register [POST]"
      operationId: devise-registrations-create
      tags:
        - User accounts
      x-controller: Api::V1::Devise::RegistrationsController
      x-controller-action: create
      description: |
        Create a new user account.

        The user will receive a confirmation email. An optional `invite_token`
        can be provided to link the registration to a pending invitation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - email
                    - password
                  properties:
                    email:
                      type: string
                      format: email
                      description: E-mail address for the new account
                    password:
                      type: string
                      format: password
                      description: Password for the new account
                    first_name:
                      type: string
                      description: First name
                    last_name:
                      type: string
                      description: Last name
                    locale:
                      type: string
                      description: Preferred language
                    actor_id:
                      type: string
                      description: Optional actor to link this user to
                    invite_token:
                      type: string
                      description: Optional invitation token
                    captcha:
                      type: string
                      description: Captcha response token
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      attributes:
                        "$ref": "#/components/schemas/AppUserSerializer"
                  meta:
                    "$ref": "#/components/schemas/meta"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"

  "/api/v1/{app}/register":
    post:
      summary: "User Account: Register for App [POST]"
      operationId: devise-registrations-create-app
      tags:
        - User accounts
      x-controller: Api::V1::Devise::RegistrationsController
      x-controller-action: create
      description: |
        Create a new user account within a specific app context.
      parameters:
        - name: app
          in: path
          required: true
          schema:
            type: string
          description: The app identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - email
                    - password
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      format: password
                    first_name:
                      type: string
                    last_name:
                      type: string
                    locale:
                      type: string
                    actor_id:
                      type: string
                    invite_token:
                      type: string
                    captcha:
                      type: string
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      attributes:
                        "$ref": "#/components/schemas/AppUserSerializer"
                  meta:
                    "$ref": "#/components/schemas/meta"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
