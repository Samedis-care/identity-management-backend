# Manual spec for Doorkeeper token revocation (logout)
---
paths:
  "/api/v1/oauth/revoke":
    post:
      summary: "Access Token: Revoke / Logout [POST]"
      operationId: doorkeeper-tokens-revoke
      tags:
        - Access Tokens
      x-controller: Api::V1::Doorkeeper::TokensController
      x-controller-action: revoke
      security:
        - Bearer: []
      description: |
        Revokes / invalidates an access token or refresh token (logout).

        If no token is provided in the body, the current Bearer token
        from the Authorization header will be revoked.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Token to be revoked (optional - falls back to current Bearer token)
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
