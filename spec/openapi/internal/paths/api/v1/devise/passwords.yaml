# Manual spec for Devise password reset
---
paths:
  "/api/v1/{app}/users/password":
    post:
      summary: "Password: Request Reset [POST]"
      operationId: devise-passwords-create
      tags:
        - User Accounts
      x-controller: Api::V1::Devise::PasswordsController
      x-controller-action: create
      description: |
        Request a password reset email.

        Rate limited to one request per 5 minutes per email address.
      parameters:
        - name: app
          in: path
          required: true
          schema:
            type: string
          description: The app identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - email
                  properties:
                    email:
                      type: string
                      format: email
                      description: E-mail address of the account to reset
      responses:
        "200":
          description: Password reset instructions sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        "400":
          description: Invalid or unknown email
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"

    put:
      summary: "Password: Reset [PUT]"
      operationId: devise-passwords-update
      tags:
        - User Accounts
      x-controller: Api::V1::Devise::PasswordsController
      x-controller-action: update
      description: |
        Complete a password reset using the token received via email.

        On success, all existing access tokens for this user are revoked.
      parameters:
        - name: app
          in: path
          required: true
          schema:
            type: string
          description: The app identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - reset_password_token
                    - password
                  properties:
                    reset_password_token:
                      type: string
                      description: Token from the password reset email
                    password:
                      type: string
                      format: password
                      description: New password
                    password_confirmation:
                      type: string
                      format: password
                      description: New password confirmation
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      attributes:
                        "$ref": "#/components/schemas/AppUserSerializer"
                  meta:
                    "$ref": "#/components/schemas/meta"
        "400":
          description: Invalid token or password
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
