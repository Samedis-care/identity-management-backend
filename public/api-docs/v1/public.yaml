          type: string
          description: a unique token id that the server generates
        tenant_id:
          type: string
          description: the used as tenant context
        auto_accept:
          type: boolean
          default: true
          description: automatically performs the invitation as soon as the user is
            logging in
        url:
          type: string
          description: the URL to be used to log in to accept the invitation
        redirect_url:
          type: string
          description: after the invitation was accepted the user will be redirect
            to this url
        accepted_at:
          type: string
          format: date-time
          description: timestamp if/when the invitation was accepted
        done:
          type: boolean
