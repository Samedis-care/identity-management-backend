            type: string
        map_actor_id:
          type: string
          description: mapped actor id
        leaf:
          type: boolean
          description: when true this is the last element of a tree
        actor_type:
          type: string
          default: ou
          description: type of actor
        insertable_child_types:
          type: array
          items:
            type: string
            description: the type of actor that is allowed as a child of this actor
        children_count:
          type: number
          description: number of children below this actor
        path:
          type: string
          description: the path of this actor within the global tree
        name:
          type: string
          default: short name
          description: descriptive name (alphanumeric lowercase) to build a unique
            path
        short_name:
          type: string
          default: short name of an organizational unit or group
          description: short name of this actor
        full_name:
          type: string
          default: full name of an organizational unit or group
          description: full name of this actor
        active:
          type: boolean
          default: true
          description: indicating if this actor is available
        deleted:
          type: boolean
          default: false
          description: indicating if this actor is marked as deleted
        created_at:
          type: string
          format: date-time
          description: created date
        updated_at:
          type: string
          format: date-time
          description: updated date
    ActorSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        parent_id:
          type: string
          description: The id of the actor this new actor will become a children of
        parent_ids:
          type: array
          description: ids of parent actors
          items:
            type: string
        map_actor_id:
          type: string
          description: ''
        leaf:
          type: boolean
          description: ''
        actor_type:
          type: string
          enum:
          - tenant
          - group
          - ou
          default: ou
          description: The type of this actor
        insertable_child_types:
          type: array
          description: for frontend ruleset only
          items:
            type: string
            description: the type of actor that is allowed as a child of this actor
        children_count:
          type: number
          description: number of children below this actor
        path:
          type: string
          description: the path of this actor within the global tree
        name:
          type: string
          default: short name
          description: descriptive name (alphanumeric lowercase) to build a unique
            path
        short_name:
          type: string
          default: short name of an organizational unit or group
          description: short name of this actor
        full_name:
          type: string
          default: full name of an organizational unit or group
          description: full name of this actor
        title:
          type: string
          default: localized title of an organizational unit or group
          description: short name of this actor
        title_translations:
          type: object
          properties:
            en:
              type: string
              description: the english locale
            de:
              type: string
              description: the german locale
        active:
          type: boolean
          default: true
          description: indicating if this actor is available
        deleted:
          type: boolean
          description: flag to check whether actor is deleted
        created_at:
          type: string
          format: date-time
          description: created date
        updated_at:
          type: string
          format: date-time
          description: updated date
        image_b64:
          type: string
          writeOnly: true
          description: BASE64 encoded image (JPEG or PNG) to be used as the user`s
            avatar
        image:
          type: object
          description: image with different styles
          properties:
            large:
              type: string
            medium:
              type: string
            small:
              type: string
    AppAdminOverviewSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        name:
          type: string
          default: app-name
          description: unique name of the app
        short_name:
          type: string
          default: app-name
          description: short name of the app
        full_name:
          type: string
          default: app-name
          description: full name of the app
        languages:
          type: array
          default:
          - de
          - en
          description: language codes of configured locales
          items:
            type: string
            description: language code
        available_languages:
          type: array
          default:
          - en
          - de
          - fr
          - ru
          - nl
          description: language codes of supported locales
          items:
            type: string
            description: language code
        image:
          type: object
          description: image in different sizes
          properties:
            large:
              type: string
            medium:
              type: string
            small:
              type: string
    AppAdminSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        name:
          type: string
          default: app-name
          description: unique name of the app
        short_name:
          type: string
          default: app-name
          description: short name of the app
        full_name:
          type: string
          default: app-name
          description: full name of the app
        languages:
          type: array
          default:
          - de
          - en
          description: language codes of configured locales
          items:
            type: string
            description: language code
        available_languages:
          type: array
          default:
          - en
          - de
          - fr
          - ru
          - nl
          description: language codes of supported locales
          items:
            type: string
            description: language code
        import_candos:
          type: string
          description: yaml data with array of all candos the app has
        import_roles:
          type: string
          description: yaml data with array of all roles the app has and assigned
            candos
        locale_import_candos:
          type: object
          description: language keys here are dynamic and can consist of any supported
            language, minimum should be those languages of the configured app locales
          properties:
            en:
              type: string
              description: the english locales for this apps functionalities as yaml
                string
            de:
              type: string
              description: the german locales for this apps functionalities as yaml
                string
        locale_import_roles:
          type: object
          description: language keys here are dynamic and can consist of any supported
            language, minimum should be those languages of the configured app locales
          properties:
            en:
              type: string
              description: the english locales for this apps roles as yaml string
            de:
              type: string
              description: the german locales for this apps roles as yaml string
        image:
          type: object
          description: image in different sizes
          properties:
            large:
              type: string
            medium:
              type: string
            small:
              type: string
        config:
          type: object
          description: Hash of app config
          properties:
            url:
              type: string
              default: https://domain.local
              description: URL of the app
            uses_bearer_token:
              type: boolean
              default: true
              description: 'If the app bearer token will be included in redirect URL
                as #anchor (true) or query param for server (false)'
            locales:
              type: array
              default:
              - de
              - en
              items:
                type: string
                description: locale string
            default_locale:
              type: string
              default: en
              description: Which of the locales is the default
            mailer:
              type: object
              description: mail config
              properties:
                from:
                  type: string
                  description: The from address used in mails for user email confirmations
                reply_to:
                  type: string
                  description: The reply address used in mails for user email confirmations
                support_email:
                  type: string
                  description: The support address used in mails for user email confirmations
                logo_b64:
                  type: string
                  description: A PNG logo as mail header in Base64 encoded format
                footer_html:
                  type: string
                  description: The footer_html of the current client locale
                footer_html_translations:
                  type: object
                  description: language keys here are dynamic and can consist of any
                    supported language, minimum should be those languages of the configured
                    app locales
                  properties:
                    en:
                      type: string
                      description: the english locale footer
                    de:
                      type: string
                      description: the german locale footer
                smtp_settings:
                  type: object
                  description: smtp settings
                  properties:
                    address:
                      type: string
                      description: Address of SMTP server
                    port:
                      type: number
                      description: Port of SMTP server
                    domain:
                      type: string
                      description: HELO domain
                    user_name:
                      type: string
                      description: SMTP username
                    password:
                      type: string
                      description: SMTP password
                    authentication:
                      type: string
                      description: 'AuthenticationMode: plain, login or cram_md5'
                    enable_starttls:
                      type: boolean
                      description: Use STARTTLS when connecting to your SMTP server
                        and fail if unsupported
                    enable_starttls_auto:
                      type: boolean
                      description: Detects if STARTTLS is enabled in your SMTP server
                        and starts to use it
                    openssl_verify_mode:
                      type: string
                      description: When using TLS, you can set how OpenSSL checks
                        the certificate. This is really useful if you need to validate
                        a self-signed and/or a wildcard certificate. You can use the
                        name of an OpenSSL verify constant ('none' or 'peer')
                    ssl:
                      type: string
                      description: 'Enables the SMTP connection to use SMTP/TLS (SMTPS:
                        SMTP over direct TLS connection)'
                    open_timeout:
                      type: number
                      description: Number of seconds to wait while attempting to open
                        a connection.
                    read_timeout:
                      type: number
                      description: Number of seconds to wait until timing-out a read(2)
                        call.
            theme:
              type: object
              description: optional theme settings
              properties:
                primary:
                  type: object
                  description: primary colors
                  properties:
                    main:
                      type: string
                      description: primary color
                    light:
                      type: string
                      description: lighter variant of the primary color
                    dark:
                      type: string
                      description: darker variant of the primary color
                secondary:
                  type: object
                  description: secondary colors
                  properties:
                    main:
                      type: string
                      description: secondary color
                    light:
                      type: string
                      description: lighter variant of the secondary color
                    dark:
                      type: string
                      description: darker variant of the secondary color
                background:
                  type: object
                  description: background
                  properties:
                    default:
                      type: string
                      description: background color
                    advanced:
                      type: string
                      description: background CSS property
                      nullable: true
                components_care:
                  type: object
                  description: components care specific settings
                  properties:
                    ui_kit:
                      type: object
                      description: theme settings for ui_kit
                      properties:
                        action_button:
                          type: object
                          description: theme settings for ActionButton
                          properties:
                            background_color:
                              type: string
                              description: background color
                mode:
                  type: string
                  default: light
                  description: light or dark theme as base
