              type: array
              description: ids to the groups below a tenant organization to authorize
                the user acception invites (adds to those the user already has)
            add_access_groups:
              type: array
              description: name identifiers in the form of `ou-name/group-name` to
                the groups below a tenant organization to authorize the user acception
                invites (adds to those the user already has)
