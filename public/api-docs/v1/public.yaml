          description: unique record id
        actor_id:
          type: string
          description: referenced actor id
        email:
          type: string
          description: e-mail address
        gender:
          type: number
          enum:
          - 0
          - 1
          - 2
          description: |
            Gender identifier
            * 0 - Unspecified
            * 1 - Male
            * 2 - Female
        first_name:
          type: string
          description: first name
        last_name:
          type: string
          description: last name
        short:
          type: string
          description: short name (combination of first and last names)
        image:
          type: object
          description: image in different sizes
          properties:
            large:
              type: string
            medium:
              type: string
            small:
              type: string
        title:
          type: string
          description: an optional user title
        mobile:
          type: string
          description: mobile number
        active:
          type: boolean
          description: if set false the login will be disabled
        deleted:
          type: boolean
          description: flag to check whether user is deleted
        invalidate:
          type: boolean
          description: returns true if an invalid_at date is present
        invalid_at:
          type: string
          format: date-time
          description: if set the login will be disabled after the date
        locale:
          type: string
          description: serves as languange preference for the user
        pwd_reset_uid:
          type: string
          description: in case of a password reset this serves as a substitute for
            the old password
        first_login_at:
          type: string
          format: date-time
          description: first login date
        last_login_at:
          type: string
          format: date-time
          description: last login date
        candos:
          type: array
          description: global candos the user has consolidated over all tenants
          items:
            type: string
        created_at:
          type: string
          format: date-time
          description: created date
        updated_at:
          type: string
          format: date-time
          description: updated date
    locales:
      type: string
      enum:
      - en
      - de
      - fr
      - ru
      - nl
    meta:
      type: object
      properties:
        locale:
          type: string
          default: en
          description: the currently selected locale
        msg:
          type: object
          description: info about the request
          properties:
            success:
              type: boolean
              default: true
              description: indicates successful requests
            message:
              anyOf:
              - type: string
                description: user friendly localized info
              - type: 'null'
            error:
              anyOf:
              - type: string
                description: if unsuccessful contains an error message
              - type: 'null'
            error_details:
              anyOf:
              - type: string
                description: more detailed error message
              - type: 'null'
servers: []
openapi: 3.1.1
paths:
  "/api/v1/{app}/oauth/token/info":
    get:
      summary: 'Access Token: Info [GET]'
      operationId: doorkeeper-token-info-show
      tags:
      - Access Tokens
      x-controller: Api::V1::App::Doorkeeper::TokenInfoController
      x-controller-action: show
      security:
      - Bearer: []
      description: 'Returns information about the currently authenticated user and
        token.

        '
      parameters:
      - name: app
        in: path
        required: true
        schema:
          type: string
        description: The app identifier
      responses:
        '200':
          description: Token info
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required:
                    - id
                    - type
                    - attributes
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        default: user
                      attributes:
                        "$ref": "#/components/schemas/AppUserSerializer"
                  meta:
                    "$ref": "#/components/schemas/meta"
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
  "/api/v1/{app}/oauth/token":
    post:
      summary: 'Access Token: Login [POST]'
      operationId: doorkeeper-tokens-create
      tags:
      - Access Tokens
      x-controller: Api::V1::App::Doorkeeper::TokensController
      x-controller-action: create
      description: |
        Authenticate a user and obtain an access token.

        Supports multiple grant types:
        - `password` - Login with email and password
        - `refresh_token` - Refresh an expired access token
        - `recovery_email` - Login with recovery email

        On successful login, the user is automatically added to the app's container.

        The response follows the JSON:API format and additionally includes
        OAuth2 token fields at the top level.
      parameters:
      - name: app
        in: path
        required: true
        schema:
          type: string
        description: The app identifier to login for
        example: identity-management
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - grant_type
              properties:
                grant_type:
                  type: string
                  enum:
                  - password
                  - refresh_token
                  - recovery_email
                  description: The OAuth2 grant type
                username:
                  type: string
                  description: The email that the user registered with
                  example: user@example.com
                email:
                  type: string
                  description: Alias for username
                password:
                  type: string
                  description: User password
                  format: password
                refresh_token:
                  type: string
                  description: Refresh token (for grant_type "refresh_token")
                invite_token:
                  type: string
                  description: Optional token for invites. Will be processed at login
                    and passed through to frontend.
                otp:
                  type: string
                  description: One-Time Password for MFA-enabled accounts
                redirect_host:
                  type: string
                  description: Redirect host after login (must be whitelisted)
                redirect_path:
                  type: string
                  description: Redirect path after login
                remember_me:
                  type: string
                  enum:
                  - 'true'
                  - 'false'
                  description: Whether to remember the session
      responses:
        '200':
          description: User logged in successfully
          content:
            application/json:
              schema:
                type: object
                description: |
                  JSON:API response with user data, meta information
                  including token details, and top-level OAuth2 fields.
                properties:
                  data:
                    type: object
                    required:
                    - id
                    - type
                    - attributes
                    properties:
                      id:
                        type: string
                        description: User ID
                      type:
                        type: string
                        default: user
                      attributes:
                        "$ref": "#/components/schemas/AppUserSerializer"
                  meta:
                    type: object
                    properties:
                      msg:
                        type: object
                        properties:
                          success:
                            type: boolean
                      token:
                        type: string
                        description: The Bearer access token
                      refresh_token:
                        type: string
                        description: Token to refresh the access token
                      expires_in:
                        type: number
                        description: Seconds until the token expires
                      redirect_url:
                        type: string
                        description: URL to redirect to after login
                      app:
                        type: string
                        description: The app context
                      invite_token:
                        type: string
                        description: Passed through invite token
                      check_acceptances:
                        type: object
                        description: Pending content acceptances for the user
                  token_type:
                    type: string
                    default: Bearer
                    description: OAuth2 token type
                  access_token:
                    type: string
                    description: OAuth2 access token (same as meta.token)
                  refresh_token:
                    type: string
                    description: OAuth2 refresh token (same as meta.refresh_token)
                  expires_in:
                    type: number
                    description: OAuth2 token expiry in seconds (same as meta.expires_in)
        '400':
          description: Invalid request (e.g. unsupported grant_type, invalid app)
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        '401':
          description: Invalid credentials or account locked
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        '403':
          description: User not confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
  "/api/v1/oauth/revoke":
    post:
      summary: 'Access Token: Revoke / Logout [POST]'
      operationId: doorkeeper-tokens-revoke
      tags:
      - Access Tokens
      x-controller: Api::V1::Doorkeeper::TokensController
      x-controller-action: revoke
      security:
      - Bearer: []
      description: |
        Revokes / invalidates an access token or refresh token (logout).

        If no token is provided in the body, the current Bearer token
        from the Authorization header will be revoked.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Token to be revoked (optional - falls back to current
                    Bearer token)
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
  "/api/v1/user/account_logins/{id}":
    delete:
      summary: 'Account Login: Delete [DELETE]'
      tags:
      - Account Logins
      operationId: user-accountlogins-destroy
      x-controller: Api::V1::User::AccountLoginsController
      x-controller-action: destroy
      x-route-name: v1_user_account_logins
      x-candos:
      - public
      x-model-type: Doorkeeper::AccessToken
      x-record-type: account_login
      description: |-
        Login history and active sessions

        ---

        To use this endpoint the current user needs to be authorized for the
        tenant to do any of these

         - public
      security:
      - Bearer: []
      parameters:
      - name: id
        in: path
        required: true
        description: Account Login id
        schema:
          type: string
      - name: locale
        in: query
        description: to control the language returned
        schema:
          "$ref": "#/components/schemas/locales"
      responses:
        '200':
          description: Doorkeeper::AccessToken deleted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/meta"
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                type: object
                description: |-
                  Some server side rule prevented finishing this request.
                  For example a multi delete might not have worked on all
                  requested records due to some rule not allowing the delete.
                  Please refer to the details in the response like
                  - `meta.msg.error` error identifier
                  - `meta.msg.message` message being displayed
                  - `meta.msg.error_details` showing the attribute causing the problem
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        '400':
          description: Some values that were sent couldn't be processed
          content:
            application/json:
              schema:
                type: object
                description: Check the returned info in meta/msg for details
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                type: object
                description: Wait for so many seconds as returned in the Retry-After
                  header before accessing this endpoint again
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                description: Requires a valid login
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        '403':
          description: Unauthorized access
          content:
            application/json:
              schema:
                type: object
                description: User is missing the access rights to do this
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
  "/api/v1/user/account_logins":
    get:
      summary: 'Account Login: List [GET]'
      tags:
      - Account Logins
      operationId: user-accountlogins-index
      x-controller: Api::V1::User::AccountLoginsController
      x-controller-action: index
      x-route-name: v1_user_account_logins
      x-candos:
      - public
      x-model-type: Doorkeeper::AccessToken
      x-record-type: account_login
      description: |-
        Login history and active sessions

        ---

        To use this endpoint the current user needs to be authorized for the
        tenant to do any of these

         - public
      security:
      - Bearer: []
      parameters:
      - name: locale
        in: query
        description: to control the language returned
        schema:
          "$ref": "#/components/schemas/locales"
      - name: quickfilter
        in: query
        schema:
          type: string
        description: performs a search in keywords
      - name: page[number]
        in: query
        schema:
          type: string
        x-example: '1'
        description: |
          the page number (starts at 1, if not given or lower than 1 then
          page 1 will automatically be assumed)'
      - name: page[limit]
        in: query
        schema:
          type: string
        x-example: '10'
        description: the number of records per page (might be limited on the server
          side, use 0 to fetch no data to get only the total count)
      - name: padding
        in: query
        schema:
          type: string
        x-example: '0'
        description: 'manually adjust db offset: (page*per_page)+padding not required
          for normal paging, in doubt omit'
      - name: sort
        in: query
        schema:
          type: string
        description: |
          JSON Array of Objects to sort the results by one
          or more fields in the requested order.
          Example:
          `[{ property: "field1", direction: "ASC" }, { property: "field2", direction: "DESC" }]`
      responses:
        '200':
          description: Doorkeeper::AccessTokens list
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                description: List endpoints will return an array below data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - type
                      - attributes
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          default: account_login
                        attributes:
                          "$ref": "#/components/schemas/AccountLoginSerializer"
                  meta:
                    "$ref": "#/components/schemas/meta"
        '400':
          description: Some values that were sent couldn't be processed
          content:
            application/json:
              schema:
                type: object
                description: Check the returned info in meta/msg for details
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                type: object
                description: Wait for so many seconds as returned in the Retry-After
                  header before accessing this endpoint again
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                type: object
                description: Requires a valid login
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
        '403':
          description: Unauthorized access
          content:
            application/json:
              schema:
                type: object
                description: User is missing the access rights to do this
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
