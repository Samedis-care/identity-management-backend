  "/api/v1/apps/{app_id}/users":
    get:
      summary: 'User: List [GET]'
      tags:
      - Users
      operationId: apps-users-index
      x-controller: Api::V1::Apps::UsersController
      x-controller-action: index
      x-route-name: v1_app_users
      x-candos:
      - "~/apps.admin+identity-management/users.reader"
      x-model-type: User
      x-record-type: user
      x-gridfilter-fields:
      - actor_id
      - created_at
      - email
      - first_name
      - gender
      - id
      - last_name
      - locale
      - title
      description: |-
        Manage users within an app

        ---

        To use this endpoint the current user needs to be authorized for the
        tenant to do any of these

         - ~/apps.admin+identity-management/users.reader
      security:
      - Bearer: []
      parameters:
      - name: tenant_id
        in: query
        required: true
        schema:
          type: string
        description: |
          The tenant context is required to determine if the user has
          the required privileges.
      - name: app_id
        in: path
        required: true
        description: User app_id
        schema:
          type: string
      - name: locale
        in: query
        description: to control the language returned
        schema:
          "$ref": "#/components/schemas/locales"
      - name: quickfilter
        in: query
        schema:
          type: string
        description: performs a search in keywords
      - name: page[number]
        in: query
        schema:
          type: string
        x-example: '1'
        description: |
          the page number (starts at 1, if not given or lower than 1 then
          page 1 will automatically be assumed)'
      - name: page[limit]
        in: query
        schema:
          type: string
        x-example: '10'
        description: the number of records per page (might be limited on the server
          side, use 0 to fetch no data to get only the total count)
      - name: padding
        in: query
        schema:
          type: string
        x-example: '0'
        description: 'manually adjust db offset: (page*per_page)+padding not required
          for normal paging, in doubt omit'
      - name: sort
        in: query
        schema:
          type: string
        description: |
          JSON Array of Objects to sort the results by one
          or more fields in the requested order.
          Example:
          `[{ property: "field1", direction: "ASC" }, { property: "field2", direction: "DESC" }]`
      - name: gridfilter
        in: query
        schema:
          type: string
        description: |
          String in JSON format for grid-based filtering.

          <details>
            <summary>The model defined these fields as allowed for filtering.</summary>

            `actor_id`, `created_at`, `email`, `first_name`, `gender`, `id`, `last_name`, `locale`, `title`

          </details>
