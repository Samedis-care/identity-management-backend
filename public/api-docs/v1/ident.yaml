          format: date-time
          description: updated date
    UserSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        actor_id:
          type: string
          description: referenced actor id
        email:
          type: string
          description: e-mail address
        gender:
          type: number
          enum:
          - 0
          - 1
          - 2
          description: |
            Gender identifier
            * 0 - Unspecified
            * 1 - Male
            * 2 - Female
        first_name:
          type: string
          description: first name
        last_name:
          type: string
          description: last name
        short:
          type: string
          description: short name (combination of first and last names)
        image:
          type: object
          description: image in different sizes
          properties:
            large:
              type: string
            medium:
              type: string
            small:
              type: string
        title:
          type: string
          description: an optional user title
        mobile:
          type: string
          description: mobile number
        active:
          type: boolean
          description: if set false the login will be disabled
        deleted:
          type: boolean
          description: flag to check whether user is deleted
        invalidate:
          type: boolean
          description: returns true if an invalid_at date is present
        invalid_at:
          type: string
          format: date-time
          description: if set the login will be disabled after the date
        locale:
          type: string
          description: serves as languange preference for the user
        pwd_reset_uid:
          type: string
          description: in case of a password reset this serves as a substitute for
            the old password
        first_login_at:
          type: string
          format: date-time
          description: first login date
        last_login_at:
          type: string
          format: date-time
          description: last login date
        candos:
          type: array
          description: global candos the user has consolidated over all tenants
          items:
            type: string
        created_at:
          type: string
          format: date-time
          description: created date
        updated_at:
          type: string
          format: date-time
          description: updated date
    locales:
      type: string
      enum:
      - en
      - de
      - fr
      - ru
      - nl
    meta:
      type: object
      properties:
        locale:
          type: string
          default: en
          description: the currently selected locale
        msg:
          type: object
          description: info about the request
          properties:
            success:
              type: boolean
              default: true
              description: indicates successful requests
            message:
              anyOf:
              - type: string
                description: user friendly localized info
              - type: 'null'
            error:
              anyOf:
              - type: string
                description: if unsuccessful contains an error message
              - type: 'null'
            error_details:
              anyOf:
              - type: string
                description: more detailed error message
              - type: 'null'
