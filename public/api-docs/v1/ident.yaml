---
info:
  title: Identity Management API
  description: |
    ## Identity Management API

    The Identity Management API provides endpoints for managing users, tenants,
    roles, organizations, access control and authentication within the
    Samedis Care identity platform.

    All endpoints follow the JSON:API specification.

    ### Authentication
    Most endpoints require a valid Bearer token obtained via OAuth2.

    ### Authorization
    Endpoints require specific `candos` (permissions) assigned to the user
    within the context of a tenant. The required candos are documented per endpoint.
  version: v1
  contact:
    name: Samedis-care GmbH
components:
  securitySchemes:
    Bearer:
      description: |
        # Token based authentication Header
        Authenticate and then copy the token into this field without the "Bearer " prefix.

        ## To obtain a bearer token
        Use the OAuth2 token endpoint.
      type: http
      scheme: bearer
  schemas:
    AccessControlSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        name:
          type: string
          description: the name of this access control
        label:
          type: string
          description: the label of this access group
        group:
          type: string
          description: a grouping name
        group_name:
          type: string
          description: the group name
        description:
          type: string
          description: describes the access this group grants (Markdown)
        role_ids:
          type: array
          items:
            type: string
            description: Id of a roles assigned to this access group
    AccountActivitySerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        location:
          type: string
          description: approximated geographic location by ip address that created
            the token
        device:
          type: string
          description: user agent that created the token
        app:
          type: string
          description: app this token belongs to
        created_at:
          type: string
          description: timestamp when this invite was created
    AccountLoginSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        current:
          type: boolean
          description: true if this is the currently used token
        location:
          type: string
          description: approximated geographic location by ip address that created
            the token
        device:
          type: string
          description: user agent that created the token
        app:
          type: string
          description: app this token belongs to
        otp_required:
          type: boolean
          description: true if this token requires to be verified by an OTP
        otp_provided:
          type: boolean
          description: true if the user has provided an OTP
        created_at:
          type: string
          format: date-time
          description: created date
    ActorMappingsSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        parent_id:
          type: string
          description: The id of the actor this new actor will become a children of
        map_actor_id:
          type: string
          description: ''
        name:
          type: string
          default: short name
          description: descriptive name (alphanumeric lowercase) to build a unique
            path
        actor_type:
          type: string
          description: type of actor
        short_name:
          type: string
          default: short name of an organizational unit or group
          description: short name of this actor
        full_name:
          type: string
          default: full name of an organizational unit or group
          description: full name of this actor
        path:
          type: string
          description: the path of this actor within the global tree
        active:
          type: boolean
          default: true
          description: indicating if this actor is available
        mapped:
          type: boolean
          description: true if already mapped into the parent, when false this record
            cannot be selected
        created_at:
          type: string
          format: date-time
          description: created date
        updated_at:
          type: string
          format: date-time
          description: updated date
    ActorOrganizationSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        parent_id:
          type: string
          description: the parent record id
        leaf:
          type: boolean
          default: false
          description: when true this is the last element of a tree
        actor_type:
          type: string
          default: ou
          description: type of actor
        insertable_child_types:
          type: array
          items:
            type: string
            description: the type of actor that is allowed as a child of this actor
        children_count:
          type: number
          description: number of children below this actor
        path:
          type: string
