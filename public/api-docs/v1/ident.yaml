          description: Users list
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                description: List endpoints will return an array below data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - id
                      - type
                      - attributes
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          default: user
                        attributes:
                          "$ref": "#/components/schemas/UserOverviewSerializer"
                  meta:
                    "$ref": "#/components/schemas/meta"
        '400':
          description: Some values that were sent couldn't be processed
          content:
            application/json:
              schema:
                type: object
                description: Check the returned info in meta/msg for details
                properties:
                  meta:
                    "$ref": "#/components/schemas/meta"
