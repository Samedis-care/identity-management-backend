                    light:
                      type: string
                      description: lighter variant of the secondary color
                    dark:
                      type: string
                      description: darker variant of the secondary color
                background:
                  type: object
                  description: background
                  properties:
                    default:
                      type: string
                      description: background color
                    advanced:
                      type: string
                      description: background CSS property
                      nullable: true
                components_care:
                  type: object
                  description: components care specific settings
                  properties:
                    ui_kit:
                      type: object
                      description: theme settings for ui_kit
                      properties:
                        action_button:
                          type: object
                          description: theme settings for ActionButton
                          properties:
                            background_color:
                              type: string
                              description: background color
                mode:
                  type: string
                  default: light
                  description: light or dark theme as base
        contents:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: id of the content
              name:
                type: string
                description: name of the content (e.g. tos)
              url:
                type: string
                description: url to load the content
              version:
                type: string
                description: the version (latest) of the content
    AppSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        url:
          type: string
          description: URL of the app
        name:
          type: string
          description: unique app name
        short_name:
          type: string
          description: short name
        full_name:
          type: string
          description: full name
        required_documents:
          type: object
          properties:
            name:
              type: string
              description: name/version of documents to show when logging into this
                app
        requires_acceptance:
          type: object
          properties:
            name:
              type: string
              description: name/boolean of documents that require user acceptance
                when logging into this app
        image:
          type: object
          description: image with different styles
          properties:
            large:
              type: string
            medium:
              type: string
            small:
              type: string
    AppUserSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id (of mapping)
        actor_id:
          type: string
          description: unique id of the users account
        active:
          type: boolean
          description: if set false the login will be disabled
        email:
          type: string
          description: the e-mail address
        unconfirmed_email:
          type: string
          description: holds the new email address until it is confirmed
        recovery_email:
          type: string
          description: a secondary email that can be used to recover an account if
            access to the main email is lost
        unconfirmed_recovery_email:
          type: string
          description: holds the chosen recovery email address until it is confirmed
        recovered_account:
          type: boolean
          description: if true this account was recovered and the main email should
            be changed
        first_name:
          type: string
          description: first name
        last_name:
          type: string
          description: last name
        short:
          type: string
          description: User short sign
        title:
          type: string
          description: User title
        gender:
          type: number
          enum:
          - 0
          - 1
          - 2
          description: |
            Gender identifier
            * 0 - Unspecified
            * 1 - Male
            * 2 - Female
        mobile:
          type: string
          description: mobile number
        locale:
          type: string
          description: language code
        password:
          type: string
          writeOnly: true
          description: the new password
        password_confirmation:
          type: string
          writeOnly: true
          description: the new password (confirmation)
        image_b64:
          type: string
          writeOnly: true
          description: BASE64 encoded image (JPEG or PNG) to be used as the user`s
            avatar
        image:
          type: object
          description: image in different sizes
          properties:
            large:
              type: string
            medium:
              type: string
            small:
              type: string
        candos:
          type: array
          description: global candos the user has, filtered to the current app context
          items:
            type: string
        tenants:
          type: array
          items:
            type: object
            properties:
              candos:
                type: array
                items:
                  type: string
        recent_invite_tokens:
          type: array
          description: a list of recent invite tokens to pass to the authenticated
            remote app so the app can process these
          items:
            type: string
        otp_enabled:
          type: boolean
          description: if true the login needs to present an input for sending an
            OTP with the login
        otp_provided:
          type: boolean
          description: if otp_enabled this will be true if an OTP was provided to
            signal the login is complete
        otp_provisioning_qr_code:
          type: string
          description: only when enabling OTP/MFA this will show an SVG image with
            a QR code to scan from an authenticator app
        otp_secret_key:
          type: string
          description: only when enabling OTP/MFA this will show the secret key to
            set up an authenticator app
        otp_backup_codes:
          type: array
          description: only after enabling OTP/MFA this will once show backup codes
          items:
            type: string
    ContentAcceptanceSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        app:
          type: string
          description: the app this content belongs to
        name:
          type: string
          default: app-name
          description: name of the content (like "tos", "app-info")
        version:
          type: number
          description: highest active-flagged version will be used
        content_translations:
          type: object
          description: Hash of locale-languages with translated content
          properties:
            de:
              type: string
              default: Deutsche Übersetzung
              description: German content
            en:
              type: string
              default: English translation
              description: English content
        acceptance_required:
          type: boolean
          default: false
          description: when true the user is required to accept every new version
            of this content
        acceptance_given:
          type: boolean
          default: false
          description: if required indicates if it was yet given by the current user
        created_at:
          type: string
          format: date-time
          description: created date
        updated_at:
          type: string
          format: date-time
          description: updated date
    ContentSerializer:
      type: object
      description: the main attributes of this record
      properties:
        id:
          type: string
          description: unique record id
        app:
          type: string
          description: the app this content belongs to
        name:
          type: string
          default: app-info
          enum:
          - tos
          - privacy
          - tos-privacy
